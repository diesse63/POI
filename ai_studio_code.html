<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>POI Map Pro</title>

    <!-- --- CONFIGURAZIONE PWA --- -->
    <meta name="theme-color" content="#007AFF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="POI Map">
    
    <!-- Link al Manifesto (Essenziale per installazione) -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Icona per iOS (Opzionale, se hai un'immagine icon.png nella cartella) -->
    <link rel="apple-touch-icon" href="icon.png">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #007AFF; --danger: #FF3B30; --success: #34C759;
            --bg: #F2F2F7; --surface: rgba(255, 255, 255, 0.95);
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); overflow: hidden; -webkit-tap-highlight-color: transparent; }

        /* LOADER */
        #bg-loader { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: var(--surface); padding: 8px 16px; border-radius: 30px; box-shadow: var(--shadow); z-index: 9000; font-size: 12px; display: none; align-items: center; gap: 8px; color: var(--primary); font-weight: 600; border: 1px solid rgba(0,0,0,0.05); }
        .spinner { width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }

        /* LOGIN SCREEN */
        #login-screen { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .login-box { width: 85%; max-width: 320px; text-align: center; }
        .inp-group { background: #f5f5f7; border-radius: 12px; padding: 5px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: none; background: transparent; font-size: 16px; outline: none; box-sizing: border-box; font-family: inherit; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }

        /* LAYOUT APP */
        #app-container { display: none; height: 100%; width: 100%; flex-direction: column; position: relative; }
        #map { flex: 1; width: 100%; z-index: 1; background: #e5e5e5; }

        /* TOOLS FLOTTANTI */
        #map-tools { position: absolute; top: 15px; right: 15px; z-index: 3000; display: flex; flex-direction: column; gap: 10px; }
        .tool-btn { width: 44px; height: 44px; background: var(--surface); border-radius: 12px; display: flex; justify-content: center; align-items: center; box-shadow: var(--shadow); border: none; font-size: 20px; cursor: pointer; color: #333; }
        
        /* NAVBAR */
        #nav-bar { height: calc(60px + var(--safe-bottom)); background: var(--surface); display: flex; align-items: flex-start; justify-content: space-around; padding-top: 10px; z-index: 4000; border-top: 1px solid rgba(0,0,0,0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #999; font-size: 10px; font-weight: 500; cursor: pointer; border: none; background: none; transition: color 0.2s; }
        .nav-icon { font-size: 24px; margin-bottom: 2px; }
        .nav-item.active { color: var(--primary); }

        /* SHEETS (PANNELLI) */
        .sheet { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; background: #fff; border-radius: 20px 20px 0 0; z-index: 5000; transition: bottom 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.15); display: flex; flex-direction: column; }
        .sheet.open { bottom: 0; }
        .sheet-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .sheet-header h2 { margin: 0; font-size: 20px; }
        .sheet-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 80px; }

        /* CARDS & LISTS */
        .poi-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .poi-card:active { background: #f9f9f9; }
        .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        
        /* POPUP STYLES */
        .leaflet-popup-content-wrapper { border-radius: 14px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0 !important; width: 260px !important; }
        .popup-body { padding: 15px; }
        .popup-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-small { padding: 8px; border-radius: 8px; border: none; font-weight: 600; font-size: 12px; cursor: pointer; }
        .btn-del { background: #fee; color: var(--danger); }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Indicatore Caricamento -->
    <div id="bg-loader"><div class="spinner"></div> Sincronizzazione...</div>

    <!-- SCHERMATA LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h1 style="margin-bottom: 10px;">POI Map</h1>
            <p style="color:#888; margin-bottom: 30px; font-size: 14px;">Inserisci le credenziali per accedere</p>
            <div class="inp-group"><input type="text" id="login-user" placeholder="Nome Utente"></div>
            <div class="inp-group"><input type="password" id="login-pass" placeholder="Password"></div>
            <button class="btn-main" onclick="app.doLogin()">Accedi</button>
            <p id="login-msg" style="color: red; font-size: 13px; margin-top: 15px;"></p>
        </div>
    </div>

    <!-- APPLICAZIONE -->
    <div id="app-container">
        
        <!-- Bottoni sulla mappa -->
        <div id="map-tools">
            <button class="tool-btn" onclick="app.syncData(true)" title="Ricarica">↻</button>
            <button class="tool-btn" onclick="app.locateMe()" title="La mia posizione" style="color:var(--primary)">📍</button>
            <button class="tool-btn" id="btn-admin" onclick="app.openSheet('admin-sheet')" style="display:none;" title="Admin">⚙️</button>
        </div>

        <div id="map"></div>

        <!-- Barra Navigazione Inferiore -->
        <nav id="nav-bar">
            <button class="nav-item" onclick="app.openSheet('search-sheet'); app.setActiveNav(this)">
                <span class="nav-icon">🔍</span>Cerca
            </button>
            <button class="nav-item" onclick="app.openSheet('list-sheet'); app.setActiveNav(this)">
                <span class="nav-icon">📋</span>Lista
            </button>
            <button class="nav-item" onclick="app.openSheet('legend-sheet'); app.setActiveNav(this)">
                <span class="nav-icon">🏷️</span>Legenda
            </button>
            <button class="nav-item" onclick="app.doLogout()">
                <span class="nav-icon">🚪</span>Esci
            </button>
        </nav>

        <!-- SHEET: LISTA -->
        <div id="list-sheet" class="sheet">
            <div class="sheet-header"><h2>I tuoi Luoghi</h2><span style="color:var(--danger); cursor:pointer" onclick="app.closeAllSheets()">Chiudi</span></div>
            <div id="list-container" class="sheet-content"></div>
        </div>

        <!-- SHEET: LEGENDA -->
        <div id="legend-sheet" class="sheet">
            <div class="sheet-header"><h2>Categorie</h2><span style="color:var(--danger); cursor:pointer" onclick="app.closeAllSheets()">Chiudi</span></div>
            <div id="legend-container" class="sheet-content"></div>
        </div>

        <!-- SHEET: CERCA -->
        <div id="search-sheet" class="sheet">
            <div class="sheet-header"><h2>Cerca</h2><span style="color:var(--danger); cursor:pointer" onclick="app.closeAllSheets()">Chiudi</span></div>
            <div class="sheet-content">
                <div class="inp-group"><input type="search" id="inp-search" placeholder="Scrivi per cercare..." onkeyup="app.filterSearch()"></div>
                <div id="search-results"></div>
            </div>
        </div>

        <!-- SHEET: ADMIN -->
        <div id="admin-sheet" class="sheet">
            <div class="sheet-header"><h2>Amministrazione</h2><span style="color:var(--danger); cursor:pointer" onclick="app.closeAllSheets()">Chiudi</span></div>
            <div class="sheet-content">
                <h4>Aggiungi Categoria</h4>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <div class="inp-group" style="flex:1"><input type="text" id="new-cat-name" placeholder="Nome"></div>
                    <input type="color" id="new-cat-color" value="#007AFF" style="height:50px; border:none; background:none;">
                </div>
                <button class="btn-main" onclick="app.addCategory()">Crea Categoria</button>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        /**
         * REGISTRAZIONE SERVICE WORKER (PWA)
         * Questo rende l'app installabile e funzionante offline (per la cache static)
         */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrato:', reg.scope))
                    .catch(err => console.log('SW fallito:', err));
            });
        }

        /**
         * LOGICA APPLICAZIONE
         */
        
        // --- CONFIGURAZIONE: INCOLLA QUI IL TUO URL GOOGLE SCRIPT ---
        const API_URL = 'INSERISCI_QUI_IL_TUO_URL_GOOGLE_SCRIPT'; 
        // -------------------------------------------------------------

        const app = {
            data: { pois: [], types: [], users: [] },
            user: null,
            map: null,
            markers: {},
            myLocMarker: null,

            init: async function() {
                // Controllo se utente già loggato
                const storedUser = localStorage.getItem('poi_user');
                if (storedUser) {
                    this.user = JSON.parse(storedUser);
                    this.showApp();
                    // Carica cache dati se esiste
                    const cachedData = localStorage.getItem('poi_data');
                    if (cachedData) this.processData(JSON.parse(cachedData));
                    // Aggiorna dati dal server
                    this.syncData();
                } else {
                    // Fetch silenzioso per avere utenti pronti al login
                    try {
                        const res = await fetch(API_URL);
                        const json = await res.json();
                        this.data.users = json.utenti || [];
                        this.data.types = json.tipologie || [];
                        this.data.pois = json.pois || [];
                    } catch(e) { console.log("Offline login setup failed"); }
                }
            },

            doLogin: function() {
                const u = document.getElementById('login-user').value.trim();
                const p = document.getElementById('login-pass').value.trim();
                
                // Cerca utente nei dati scaricati
                const valid = this.data.users.find(usr => usr.user === u && String(usr.pass) === String(p));
                
                if (valid) {
                    this.user = valid;
                    localStorage.setItem('poi_user', JSON.stringify(valid));
                    this.showApp();
                    this.syncData(true);
                } else {
                    document.getElementById('login-msg').innerText = "Utente o Password errati.";
                }
            },

            doLogout: function() {
                if(confirm("Vuoi uscire?")) {
                    localStorage.removeItem('poi_user');
                    location.reload();
                }
            },

            showApp: function() {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                if (this.user.ruolo === 'admin' || this.user.role === 'admin') {
                    document.getElementById('btn-admin').style.display = 'flex';
                }
                this.initMap();
            },

            initMap: function() {
                if (this.map) return;
                // Centra sull'Italia di default
                this.map = L.map('map', { zoomControl: false }).setView([41.9, 12.5], 6);
                
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    maxZoom: 19,
                    attribution: '&copy; OSM & Carto'
                }).addTo(this.map);

                // Doppio click per aggiungere POI
                this.map.on('dblclick', (e) => {
                    this.showAddPopup(e.latlng);
                });

                this.locateMe();
            },

            locateMe: function() {
                if(!this.map) return;
                this.map.locate({setView: true, maxZoom: 16});
                this.map.once('locationfound', e => {
                    if(this.myLocMarker) this.map.removeLayer(this.myLocMarker);
                    this.myLocMarker = L.circleMarker(e.latlng, { radius: 8, color: '#fff', fillColor: '#007AFF', fillOpacity: 1 }).addTo(this.map);
                });
            },

            syncData: async function(showLoader = false) {
                if(showLoader) document.getElementById('bg-loader').style.display = 'flex';
                try {
                    const res = await fetch(API_URL);
                    const json = await res.json();
                    localStorage.setItem('poi_data', JSON.stringify(json));
                    this.processData(json);
                } catch (e) { console.error("Sync error", e); }
                document.getElementById('bg-loader').style.display = 'none';
            },

            processData: function(json) {
                this.data.pois = json.pois || [];
                this.data.types = json.tipologie || [];
                if(json.utenti) this.data.users = json.utenti;

                this.renderMap();
                this.renderList();
                this.renderLegend();
            },

            renderMap: function() {
                // Pulisci vecchi marker
                for (let id in this.markers) this.map.removeLayer(this.markers[id]);
                this.markers = {};

                this.data.pois.forEach(poi => {
                    const typeInfo = this.data.types.find(t => t.nome === poi.tipo) || { colore: '#999' };
                    
                    // Icona CSS personalizzata
                    const iconHtml = `<div style="background:${typeInfo.colore}; width:16px; height:16px; border-radius:50%; border:2px solid white; box-shadow:0 2px 5px rgba(0,0,0,0.3);"></div>`;
                    const icon = L.divIcon({ className: 'custom-pin', html: iconHtml, iconSize: [20, 20] });

                    const m = L.marker([poi.lat, poi.lng], { icon: icon }).addTo(this.map);
                    
                    // Popup Info
                    const canDelete = (this.user.role === 'admin' || poi.user === this.user.user);
                    const content = `
                        <div class="popup-body">
                            <h3 style="margin:0 0 5px 0;">${poi.nome}</h3>
                            <small style="color:${typeInfo.colore}; font-weight:bold;">${poi.tipo}</small>
                            <p style="font-size:13px; color:#555; margin:10px 0;">${poi.note || ''}</p>
                            <div class="popup-actions">
                                <button class="btn-small" style="background:#f0f0f0" onclick="window.open('https://maps.google.com/?q=${poi.lat},${poi.lng}')">Naviga</button>
                                ${canDelete ? `<button class="btn-small btn-del" onclick="app.deletePoi('${poi.id}')">Elimina</button>` : ''}
                            </div>
                        </div>
                    `;
                    m.bindPopup(content);
                    this.markers[poi.id] = m;
                });
            },

            showAddPopup: function(latlng) {
                // Crea opzioni select
                const opts = this.data.types.map(t => `<option value="${t.nome}">${t.nome}</option>`).join('');
                
                const content = `
                    <div class="popup-body">
                        <h3 style="margin-top:0;">Nuovo Punto</h3>
                        <div class="inp-group" style="margin-bottom:8px;"><input id="new-name" placeholder="Nome Luogo"></div>
                        <div class="inp-group" style="margin-bottom:8px;"><select id="new-type">${opts}</select></div>
                        <div class="inp-group" style="margin-bottom:8px;"><textarea id="new-note" rows="2" placeholder="Note"></textarea></div>
                        <button class="btn-main" style="width:100%; padding:10px;" onclick="app.savePoi(${latlng.lat}, ${latlng.lng})">Salva</button>
                    </div>
                `;
                L.popup().setLatLng(latlng).setContent(content).openOn(this.map);
            },

            savePoi: async function(lat, lng) {
                const name = document.getElementById('new-name').value;
                const type = document.getElementById('new-type').value;
                const note = document.getElementById('new-note').value;

                if(!name) return alert("Inserisci almeno il nome");
                
                this.map.closePopup();
                document.getElementById('bg-loader').style.display = 'flex';

                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        action: 'addPoi',
                        lat, lng, name, type, note,
                        user: this.user.user
                    })
                });

                // Attendi un attimo per propagazione su Sheet
                setTimeout(() => this.syncData(true), 1500);
            },

            deletePoi: async function(id) {
                if(!confirm("Eliminare definitivamente?")) return;
                this.map.closePopup();
                document.getElementById('bg-loader').style.display = 'flex';
                
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'deletePoi', id: id })
                });
                
                setTimeout(() => this.syncData(true), 1500);
            },

            addCategory: async function() {
                const name = document.getElementById('new-cat-name').value;
                const color = document.getElementById('new-cat-color').value;
                if(!name) return;
                
                document.getElementById('bg-loader').style.display = 'flex';
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'addType', name, color })
                });
                
                document.getElementById('new-cat-name').value = '';
                this.closeAllSheets();
                setTimeout(() => this.syncData(true), 1500);
            },

            // --- FUNZIONI UI ---
            renderList: function() {
                const list = document.getElementById('list-container');
                list.innerHTML = '';
                this.data.pois.forEach(poi => {
                    const t = this.data.types.find(x => x.nome === poi.tipo) || {colore:'#ccc'};
                    const div = document.createElement('div');
                    div.className = 'poi-card';
                    div.innerHTML = `<div class="dot" style="background:${t.colore}"></div><div><b>${poi.nome}</b><br><small style="color:#888">${poi.tipo}</small></div>`;
                    div.onclick = () => {
                        this.closeAllSheets();
                        this.map.setView([poi.lat, poi.lng], 16);
                        if(this.markers[poi.id]) this.markers[poi.id].openPopup();
                    };
                    list.appendChild(div);
                });
            },

            renderLegend: function() {
                const div = document.getElementById('legend-container');
                div.innerHTML = '';
                this.data.types.forEach(t => {
                    div.innerHTML += `<div class="poi-card"><div class="dot" style="background:${t.colore}"></div>${t.nome}</div>`;
                });
            },

            filterSearch: function() {
                const q = document.getElementById('inp-search').value.toLowerCase();
                const res = document.getElementById('search-results');
                res.innerHTML = '';
                if(q.length < 2) return;

                const found = this.data.pois.filter(p => p.nome.toLowerCase().includes(q) || (p.note||'').toLowerCase().includes(q));
                found.forEach(poi => {
                    const d = document.createElement('div');
                    d.className = 'poi-card';
                    d.innerHTML = `<b>${poi.nome}</b>`;
                    d.onclick = () => {
                        this.closeAllSheets();
                        this.map.setView([poi.lat, poi.lng], 16);
                        this.markers[poi.id].openPopup();
                    };
                    res.appendChild(d);
                });
            },

            openSheet: function(id) {
                this.closeAllSheets();
                document.getElementById(id).classList.add('open');
            },
            closeAllSheets: function() {
                document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            },
            setActiveNav: function(el) {
                el.classList.add('active');
            }
        };

        // Avvio app
        window.onload = () => app.init();
    </script>
</body>
</html>
